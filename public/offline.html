<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#156FD6" />
    <title>Password Vault</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(21, 111, 214, 0.18), transparent 30%),
          linear-gradient(180deg, #efebe4 0%, #e6e1d9 100%);
        color: #182536;
      }

      main {
        width: min(92vw, 420px);
        padding: 32px 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
        box-shadow: 0 22px 48px rgba(17, 26, 38, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(24, 37, 54, 0.76);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Password Vault</h1>
      <p>You are offline right now. Reconnect to continue using the latest synced data.</p>
    </main>
  </body>
</html>
